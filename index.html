<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>CoToZaMuza</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>🎵 CoToZaMuza 🎵</h2>

<button id="playButton" onclick="playSong()">Play</button>


<br><br>

<p id="level"></p>
<p id="time"></p>

<div class="buttons">
    <button id="checkButton" onclick="check()">Zgadnij</button>
    <button id="nextButton" onclick="next()">Następna</button>
</div>

<div class="inputs">
    <input class="guess" placeholder="Wpisz tytuł... (podejście 1)">
    <input class="guess" placeholder="Wpisz tytuł... (podejście 2)">
    <input class="guess" placeholder="Wpisz tytuł... (podejście 3)">
    <input class="guess" placeholder="Wpisz tytuł... (podejście 4)">
    <input class="guess" placeholder="Wpisz tytuł... (podejście 5)">
    <input class="guess" placeholder="Wpisz tytuł... (podejście 6)">
</div>



<p id="result"></p>
<button id="playFullButton" class="hidden" onclick="playStopFullSong()">Odtwórz całą piosenkę</button>

<div id="player"></div>
<audio id="audio"></audio>

<script src="songs.js"></script>
<script src="script.js"></script>

</body>
</html>
